name: Dependabot Auto-merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pull_request:
        description: "Dependabot PR number or URL"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == 'dependabot'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target pull request
        id: pull_request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            AUTHOR="${{ github.event.pull_request.user.login }}"
            PR_URL="${{ github.event.pull_request.html_url }}"
            PR_NUMBER="${{ github.event.pull_request.number }}"
            IS_DRAFT="${{ github.event.pull_request.isDraft }}"
          else
            PR_REF="${{ inputs.pull_request }}"

            AUTHOR="$(gh pr view "$PR_REF" --repo "${{ github.repository }}" --json author --jq '.author.login')"
            PR_URL="$(gh pr view "$PR_REF" --repo "${{ github.repository }}" --json url --jq '.url')"
            PR_NUMBER="$(gh pr view "$PR_REF" --repo "${{ github.repository }}" --json number --jq '.number')"
            IS_DRAFT="$(gh pr view "$PR_REF" --repo "${{ github.repository }}" --json isDraft --jq '.isDraft')"
          fi

          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"

          if [ "$AUTHOR" != "dependabot[bot]" ] && [ "$AUTHOR" != "dependabot" ]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "reason=Target PR author '$AUTHOR' is not Dependabot." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$IS_DRAFT" = "true" ]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "reason=Target PR is still marked as draft." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "eligible=true" >> "$GITHUB_OUTPUT"

      - name: Explain skipped PR
        if: steps.pull_request.outputs.eligible != 'true'
        run: echo "${{ steps.pull_request.outputs.reason }}"

      - name: Enable auto-merge
        if: steps.pull_request.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.pull_request.outputs.url }}
        run: gh pr merge --auto --merge "$PR_URL"
